<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="crud.css">
    <title>CRUDS - Product Management</title>
</head>

<body>
    <div id="loding"><!-- -->
        <p id="aaa"></p>
        <div class="jjj">
            <div id="jjj"></div>
        </div>
    </div>
    <div class="crud">
        <div>

        </div>
        <div class="head">
            <div>
                <h2>cruds</h2>
                <p>prodect management system</p>
            </div>
            <button id="them"></button>
        </div>
        <div class="inputs">
            <input type="text" id="title" placeholder="title">
            <div class="price">
                <input onkeyup="getTotal()" type="number" id="price" placeholder="price">
                <input onkeyup="getTotal()" type="number" id="taxes" placeholder="taxes">
                <input onkeyup="getTotal()" type="number" id="ads" placeholder="ads">
                <input onkeyup="getTotal()" type="number" id="discount" placeholder="discount">
                <small id="total"></small>
            </div>
            <input type="number" id="count" placeholder="count">
            <input type="text" id="category" placeholder="category">
            <button id="submit">Create</button>
        </div>
        <div class="outputs">
            <div class="searchBlock">
                <input onkeyup="searchData(this.value)" type="text" id="search" placeholder="Search">
                <div class="btnSearch">
                    <button onclick="getSearchMood(this.id) " id="searchTitle">Search By Title</button>
                    <button onclick="getSearchMood(this.id) " id="searchCategory">Search By Category</button>
                </div>
            </div>
            <div id="deleteAll"></div>
            <div class="table-container">
                <Table>
                    <tr>
                        <th>id</th>
                        <th>title</th>
                        <th>price</th>
                        <th>taxes</th>
                        <th>ads</th>
                        <th>discount</th>
                        <th>total</th>
                        <th>category</th>
                        <th>update</th>
                        <th class="delete">delete</th>
                    </tr>
                    <tbody id="tbody">
    
                    </tbody>
                </Table>
            </div>

        </div>
    </div>
    <script src="crud.js"></script>
</body>

</html>
